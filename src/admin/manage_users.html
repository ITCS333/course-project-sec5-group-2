<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Admin Portal</title>
     <style>
          body {
               font-family: Arial, sans-serif;
               max-width: 1000px;
               margin: 0 auto;
               padding: 20px;
               background-color: #f5f5f5;
          }

          header {
               background-color: #2c3e50;
               color: white;
               padding: 20px;
               border-radius: 8px;
               margin-bottom: 20px;
          }

          header h1 {
               margin: 0;
          }

          main section {
               background: white;
               padding: 20px;
               border-radius: 8px;
               box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
               margin-bottom: 20px;
          }

          fieldset {
               border: 1px solid #ccc;
               border-radius: 5px;
               padding: 15px;
          }

          label {
               display: block;
               margin-top: 10px;
               font-weight: bold;
          }

          input,
          select {
               width: 100%;
               padding: 8px;
               margin-top: 5px;
               border: 1px solid #ccc;
               border-radius: 5px;
               box-sizing: border-box;
               font-size: 1em;
          }

          button[type="submit"] {
               margin-top: 15px;
               padding: 10px 25px;
               background-color: #2c3e50;
               color: white;
               border: none;
               border-radius: 5px;
               cursor: pointer;
               font-size: 1em;
          }

          button[type="submit"]:hover {
               background-color: #3d5166;
          }

          table {
               width: 100%;
               border-collapse: collapse;
               margin-top: 10px;
          }

          th,
          td {
               padding: 10px;
               border: 1px solid #ddd;
               text-align: left;
          }

          th {
               background-color: #2c3e50;
               color: white;
               cursor: pointer;
          }

          tr:nth-child(even) {
               background-color: #f9f9f9;
          }

          .edit-btn {
               padding: 5px 10px;
               background-color: #f39c12;
               color: white;
               border: none;
               border-radius: 4px;
               cursor: pointer;
               margin-right: 5px;
          }

          .delete-btn {
               padding: 5px 10px;
               background-color: #e74c3c;
               color: white;
               border: none;
               border-radius: 4px;
               cursor: pointer;
          }

          #search-input {
               margin-bottom: 10px;
          }
     </style>
     <script src="manage_users.js" defer></script>
</head>

<body>

     <header>
          <h1>Admin Portal</h1>
     </header>

     <main>

          <!-- Section 1: Password Management -->
          <section>
               <h2>Change Your Password</h2>
               <form id="password-form" action="#">
                    <fieldset>
                         <legend>Password Update</legend>

                         <label for="current-password">Current Password</label>
                         <input type="password" id="current-password" required>

                         <label for="new-password">New Password</label>
                         <input type="password" id="new-password" required minlength="8">

                         <label for="confirm-password">Confirm New Password</label>
                         <input type="password" id="confirm-password" required>

                         <button type="submit" id="change">Update Password</button>
                    </fieldset>
               </form>
          </section>

          <!-- Section 2: User Management -->
          <section>
               <h2>Manage Users</h2>

               <details>
                    <summary>Add New User</summary>
                    <form id="add-user-form" action="#">
                         <fieldset>
                              <legend>New User Information</legend>

                              <label for="user-name">Full Name</label>
                              <input type="text" id="user-name" required placeholder="Enter full name">

                              <label for="user-email">Email</label>
                              <input type="email" id="user-email" required placeholder="Enter email">

                              <label for="default-password">Default Password</label>
                              <input type="password" id="default-password" required minlength="8">

                              <label for="is-admin">Role</label>
                              <select id="is-admin">
                                   <option value="0">Student</option>
                                   <option value="1">Admin</option>
                              </select>

                              <button type="submit" id="add">Add User</button>
                         </fieldset>
                    </form>
               </details>

               <h3>Registered Users</h3>

               <input type="text" id="search-input" placeholder="Search by name or email...">

               <table id="user-table">
                    <thead>
                         <tr>
                              <th>Name</th>
                              <th>Email</th>
                              <th>Admin</th>
                              <th>Actions</th>
                         </tr>
                    </thead>
                    <tbody id="user-table-body"></tbody>
               </table>
          </section>

     </main>

</body>

</html>
