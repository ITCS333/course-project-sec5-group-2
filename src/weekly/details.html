<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Week Details</title>
     <style>
          body {
               font-family: Arial, sans-serif;
               max-width: 900px;
               margin: 0 auto;
               padding: 20px;
               background-color: #f5f5f5;
          }

          header {
               background-color: #2c3e50;
               color: white;
               padding: 20px;
               border-radius: 8px;
               margin-bottom: 20px;
          }

          header h1 {
               margin: 0;
          }

          article {
               background: white;
               padding: 20px;
               border-radius: 8px;
               box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
               margin-bottom: 20px;
          }

          #week-links-list li {
               margin-bottom: 8px;
          }

          #week-links-list a {
               color: #2c3e50;
          }

          #discussion-forum {
               background: white;
               padding: 20px;
               border-radius: 8px;
               box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
          }

          #comment-list article {
               border-left: 4px solid #2c3e50;
               margin-bottom: 10px;
               padding: 10px 15px;
               box-shadow: none;
          }

          #comment-list footer {
               color: #888;
               font-size: 0.85em;
               margin-top: 5px;
          }

          textarea {
               width: 100%;
               padding: 10px;
               border: 1px solid #ccc;
               border-radius: 5px;
               font-size: 1em;
               box-sizing: border-box;
          }

          button[type="submit"] {
               margin-top: 10px;
               padding: 10px 20px;
               background-color: #2c3e50;
               color: white;
               border: none;
               border-radius: 5px;
               cursor: pointer;
               font-size: 1em;
          }

          button[type="submit"]:hover {
               background-color: #3d5166;
          }

          a.back-link {
               display: inline-block;
               margin-bottom: 15px;
               color: #2c3e50;
               text-decoration: none;
          }

          a.back-link:hover {
               text-decoration: underline;
          }
     </style>
     <script src="details.js" defer></script>
</head>

<body>

     <header>
          <h1 id="week-title">Loading...</h1>
     </header>

     <main>
          <a class="back-link" href="list.html">← Back to All Weeks</a>

          <article>
               <p id="week-start-date"></p>
               <p id="week-description"></p>
               <ul id="week-links-list"></ul>
          </article>

          <section id="discussion-forum">
               <h2>Discussion</h2>
               <div id="comment-list"></div>

               <form id="comment-form" action="#">
                    <fieldset>
                         <legend>Leave a Comment</legend>
                         <label for="new-comment">Your Comment:</label>
                         <textarea id="new-comment" rows="4" required
                              placeholder="Write your comment here..."></textarea>
                         <button type="submit">Post Comment</button>
                    </fieldset>
               </form>
          </section>
     </main>

</body>

</html>
