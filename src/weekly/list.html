<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Course Breakdown</title>
    <link rel="stylesheet" href="../../src/common/styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        header h1 {
            margin: 0;
        }

        article {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 5px solid #2c3e50;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        article h2 {
            margin-top: 0;
            color: #2c3e50;
        }

        article p {
            color: #555;
        }

        article a {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        article a:hover {
            background-color: #3d5166;
        }
    </style>
    <script src="list.js" defer></script>
</head>

<body>

    <header>
        <h1>Weekly Course Breakdown</h1>
    </header>

    <main>
        <section id="week-list-section">
            <!-- list.js will inject articles here -->
        </section>
    </main>

</body>

</html>
