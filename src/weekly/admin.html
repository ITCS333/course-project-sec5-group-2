<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Manage Weekly Breakdown</title>
     <style>
          body {
               font-family: Arial, sans-serif;
               max-width: 1000px;
               margin: 0 auto;
               padding: 20px;
               background-color: #f5f5f5;
          }

          header {
               background-color: #2c3e50;
               color: white;
               padding: 20px;
               border-radius: 8px;
               margin-bottom: 20px;
          }

          header h1 {
               margin: 0;
          }

          section {
               background: white;
               padding: 20px;
               border-radius: 8px;
               box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
               margin-bottom: 20px;
          }

          fieldset {
               border: 1px solid #ccc;
               border-radius: 5px;
               padding: 15px;
          }

          label {
               display: block;
               margin-top: 10px;
               font-weight: bold;
          }

          input[type="text"],
          input[type="date"],
          textarea {
               width: 100%;
               padding: 8px;
               margin-top: 5px;
               border: 1px solid #ccc;
               border-radius: 5px;
               box-sizing: border-box;
               font-size: 1em;
          }

          button[type="submit"] {
               margin-top: 15px;
               padding: 10px 25px;
               background-color: #2c3e50;
               color: white;
               border: none;
               border-radius: 5px;
               cursor: pointer;
               font-size: 1em;
          }

          button[type="submit"]:hover {
               background-color: #3d5166;
          }

          table {
               width: 100%;
               border-collapse: collapse;
               margin-top: 10px;
          }

          th,
          td {
               padding: 10px;
               border: 1px solid #ddd;
               text-align: left;
          }

          th {
               background-color: #2c3e50;
               color: white;
          }

          tr:nth-child(even) {
               background-color: #f9f9f9;
          }

          .edit-btn {
               padding: 5px 10px;
               background-color: #f39c12;
               color: white;
               border: none;
               border-radius: 4px;
               cursor: pointer;
               margin-right: 5px;
          }

          .delete-btn {
               padding: 5px 10px;
               background-color: #e74c3c;
               color: white;
               border: none;
               border-radius: 4px;
               cursor: pointer;
          }

          .edit-btn:hover {
               background-color: #d68910;
          }

          .delete-btn:hover {
               background-color: #c0392b;
          }

          a.back-link {
               display: inline-block;
               margin-bottom: 15px;
               color: #2c3e50;
               text-decoration: none;
          }

          a.back-link:hover {
               text-decoration: underline;
          }
     </style>
     <script src="admin.js" defer></script>
</head>

<body>

     <header>
          <h1>Manage Weekly Breakdown</h1>
     </header>

     <main>
          <a class="back-link" href="list.html">← Back to List</a>

          <section>
               <h2>Add a New Week</h2>
               <form id="week-form" action="#">
                    <fieldset>
                         <legend>Weekly Details</legend>

                         <label for="week-title">Week Title</label>
                         <input type="text" id="week-title" required placeholder="Week 1: Introduction to HTML">

                         <label for="week-start-date">Start Date</label>
                         <input type="date" id="week-start-date" required>

                         <label for="week-description">Description</label>
                         <textarea id="week-description" rows="5"></textarea>

                         <label for="week-links">Resource Links (one URL per line)</label>
                         <textarea id="week-links" rows="3" placeholder="https://example.com"></textarea>

                         <button type="submit" id="add-week">Add Week</button>
                    </fieldset>
               </form>
          </section>

          <section>
               <h2>Current Weekly Breakdown</h2>
               <table id="weeks-table">
                    <thead>
                         <tr>
                              <th>Week Title</th>
                              <th>Start Date</th>
                              <th>Description</th>
                              <th>Actions</th>
                         </tr>
                    </thead>
                    <tbody id="weeks-tbody"></tbody>
               </table>
          </section>
     </main>

</body>

</html>
