<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic Details</title>
    <link rel="stylesheet" href="../common/styles.css">
    <script src="topic.js" defer></script>
</head>
<body>

    <header>
        <h1 id="topic-subject"></h1>
    </header>

    <main>

        <!-- Section 1: Original Post -->
        <article id="original-post">
            <p id="op-message"></p>
            <footer id="op-footer"></footer>
            <div id="op-actions">
                <!-- topic.js injects Edit and Delete buttons here -->
            </div>
        </article>


        <!-- Section 2: Replies -->
        <section id="replies-section">
            <h2>Replies</h2>

            <div id="reply-list-container">
                <!-- topic.js injects one <article> per reply here -->
            </div>

            <!-- Section 3: Add a Reply Form -->
            <form id="reply-form" action="#">
                <fieldset>
                    <legend>Your Reply</legend>

                    <label for="new-reply">Reply</label>
                    <textarea id="new-reply" required></textarea>

                    <button type="submit">Post Reply</button>
                </fieldset>
            </form>

        </section>

    </main>
</body>
</html>
